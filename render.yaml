services:
  - type: web
    name: ai-starter
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_API_KEY
        sync: false
